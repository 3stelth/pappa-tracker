<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🍼 Pappa Tracker</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍼</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --gabriel-pri: #4A90D9; --gabriel-acc: #2D6CB4; --gabriel-light: #E8F1FB;
  --vittorio-pri: #14B8A6; --vittorio-acc: #0D9488; --vittorio-light: #E6FAF7;
  --bg: #F6F7FB; --card: #fff; --txt: #1a1a2e; --sub: #888; --border: #eee;
  --green: #10B981; --green-light: #DCFCE7; --red: #EF4444; --red-light: #FEF2F2;
}
body.dark {
  --bg: #0f0f1a; --card: #1e1e30; --txt: #e0e0e0; --sub: #888; --border: #333;
  --green-light: #064e3b; --red-light: #450a0a;
}
body.dark .cal-head { color: #666; }
body.dark .cal-day { color: #ccc; }
body.dark .cal-day.other { color: #444; }
body.dark .empty { color: #555; }
body.dark .entry-note { color: #666; }
body.dark .recap-line b { color: #ccc; }
body.dark .form-input, body.dark .form-select { background: #2a2a3e; color: #e0e0e0; border-color: #444; }
body.dark .modal { background: #1e1e30; }
body.dark .chip { background: #2a2a3e; color: #aaa; border-color: #444; }
body.dark .quickadd-popup { background: #1e1e30; }
body.dark .quickadd-btn { background: #2a2a3e; color: #ccc; }
body.dark .weight-chart-modal { background: #1e1e30; }
body.dark .lock-screen { background: #0f0f1a; }
body.dark .lock-title { color: #e0e0e0; }
body.dark .lock-input { background: #1e1e30; color: #e0e0e0; border-color: #444; }
body.dark .btn-cancel { background: #2a2a3e; color: #aaa; border-color: #444; }
body.dark .therapy-item { background: var(--card); }
body.dark .therapy-item.done { background: #0a2e1a; }
body.dark .entry-del { background: #3a1a1a; }
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--txt); max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
.header { padding: 22px 16px 14px; border-radius: 0 0 24px 24px; color: #fff; position: sticky; top: 0; z-index: 30; overflow: hidden; }
.header::after { content: ''; position: absolute; top: -20px; right: -20px; width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,0.08); }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; position: relative; z-index: 1; }
.app-title { font-size: 19px; font-weight: 800; }
.app-sub { font-size: 10px; opacity: 0.8; }
.header-btns { display: flex; gap: 5px; }
.header-btns button { background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 9px; padding: 3px 7px; border-radius: 7px; cursor: pointer; font-weight: 600; font-family: inherit; }
.pills { display: flex; gap: 6px; margin-bottom: 8px; position: relative; z-index: 1; }
.pill { flex: 1; padding: 8px 0; border: none; border-radius: 12px; font-size: 12px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; transition: all 0.25s; white-space: nowrap; }
.pill.off { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.85); }
.pill.on { background: #fff; box-shadow: 0 3px 12px rgba(0,0,0,0.12); transform: scale(1.02); }
.tabs { display: flex; gap: 4px; position: relative; z-index: 1; }
.tab { flex: 1; padding: 8px 0; border: none; border-radius: 12px; font-size: 11px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; transition: all 0.25s; white-space: nowrap; }
.tab.off { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.85); }
.tab.on { background: rgba(255,255,255,0.95); box-shadow: 0 3px 12px rgba(0,0,0,0.12); }
.cal-wrap { padding: 10px 12px 0; }
.cal { background: var(--card); border-radius: 16px; padding: 10px; box-shadow: 0 1px 12px rgba(0,0,0,0.04); }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.cal-nav button { border: none; width: 28px; height: 28px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 700; font-family: inherit; }
.cal-nav span { font-weight: 700; font-size: 13px; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; text-align: center; }
.cal-head { font-size: 9px; font-weight: 700; color: #aaa; padding: 2px 0; }
.cal-day { border: none; width: 100%; aspect-ratio: 1; border-radius: 9px; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; background: transparent; font-family: 'Nunito', sans-serif; font-weight: 600; transition: all 0.15s; }
.cal-day.other { color: #ccc; }
.cal-dots { display: flex; gap: 1.5px; }
.cal-dot { width: 3px; height: 3px; border-radius: 50%; }
.recap-section { padding: 10px 12px 0; }
.recap-label { font-size: 11px; font-weight: 800; color: #888; margin-bottom: 6px; }
.recap-row { display: flex; gap: 8px; }
.recap-card { flex: 1; background: var(--card); border-radius: 14px; padding: 9px 11px; box-shadow: 0 1px 8px rgba(0,0,0,0.04); border-top: 3px solid; }
.recap-name { font-size: 11px; font-weight: 800; margin-bottom: 5px; }
.recap-line { display: flex; align-items: center; gap: 4px; font-size: 10px; margin-bottom: 2px; }
.recap-line b { font-weight: 700; color: #444; }
.recap-line .sub { font-size: 9px; color: #aaa; }
.therapy-badges { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
.therapy-badge { display: inline-flex; align-items: center; gap: 2px; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 5px; }
.therapy-badge.done { background: var(--green-light); color: var(--green); }
.therapy-badge.pending { background: var(--red-light); color: var(--red); }
.content { padding: 10px 12px 0; }
.content-title { font-size: 12px; font-weight: 800; color: #555; margin-bottom: 6px; }
.empty { background: var(--card); border-radius: 14px; padding: 20px 16px; text-align: center; color: #bbb; font-size: 11px; box-shadow: 0 1px 8px rgba(0,0,0,0.03); }
.entry { background: var(--card); border-radius: 12px; padding: 8px 10px; box-shadow: 0 1px 8px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 8px; border-left: 3px solid; margin-bottom: 6px; cursor: pointer; }
.entry-icon { font-size: 16px; flex-shrink: 0; }
.entry-body { flex: 1; min-width: 0; }
.entry-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.entry-time { font-weight: 800; font-size: 12px; }
.entry-ml { font-size: 11px; font-weight: 700; }
.entry-tag { font-size: 8px; padding: 1px 5px; border-radius: 5px; font-weight: 700; }
.entry-note { font-size: 9px; color: #999; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-del { border: none; background: #fee; color: #e55; width: 22px; height: 22px; border-radius: 6px; font-size: 10px; cursor: pointer; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: inherit; }
.therapy-item { background: var(--card); border-radius: 12px; padding: 10px 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.04); border-left: 3px solid; margin-bottom: 7px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.2s; }
.therapy-item.done { background: #F0FDF4; opacity: 0.85; }
.therapy-check { width: 22px; height: 22px; border-radius: 7px; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; font-size: 13px; color: #fff; font-weight: 800; }
.therapy-check.checked { background: var(--green); border-color: var(--green); }
.therapy-name { font-weight: 800; font-size: 12px; }
.therapy-name.checked { text-decoration: line-through; color: #999; }
.therapy-cat { font-size: 8px; padding: 1px 5px; border-radius: 5px; font-weight: 700; }
.therapy-dose { font-size: 9px; color: #888; margin-top: 1px; }
.therapy-done-badge { font-size: 8px; font-weight: 700; color: var(--green); background: var(--green-light); padding: 2px 5px; border-radius: 5px; }
.fab { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 50px; height: 50px; border-radius: 50%; color: #fff; border: none; font-size: 26px; font-weight: 300; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.25); z-index: 100; display: flex; align-items: center; justify-content: center; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: #fff; border-radius: 20px 20px 0 0; padding: 18px 16px 28px; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 12px; }
.modal-title { font-size: 15px; font-weight: 800; margin-bottom: 14px; }
.form-label { font-size: 10px; font-weight: 700; color: #888; margin-bottom: 4px; display: block; }
.form-row { display: flex; gap: 6px; margin-bottom: 12px; align-items: center; }
.form-select { flex: 1; padding: 8px; border-radius: 10px; border: 2px solid var(--border); font-size: 15px; font-weight: 700; background: #fafafa; text-align: center; font-family: 'Nunito', sans-serif; }
.form-input { width: 100%; padding: 8px 12px; border-radius: 10px; border: 2px solid var(--border); font-size: 14px; font-family: 'Nunito', sans-serif; outline: none; transition: border 0.2s; }
.form-input:focus { border-color: var(--gabriel-pri); }
.form-input.big { font-size: 16px; font-weight: 700; }
.chips { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.chip { padding: 7px 13px; border: 2px solid #ddd; border-radius: 10px; background: #fff; color: #666; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Nunito', sans-serif; }
.chip.on { border-color: var(--gabriel-pri); background: var(--gabriel-pri); color: #fff; }
.form-actions { display: flex; gap: 8px; margin-top: 4px; }
.btn-cancel { flex: 1; padding: 11px; border-radius: 12px; border: 2px solid var(--border); background: #fff; font-size: 13px; font-weight: 700; cursor: pointer; color: #888; font-family: 'Nunito', sans-serif; }
.btn-save { flex: 2; padding: 11px; border-radius: 12px; border: none; color: #fff; font-size: 13px; font-weight: 800; cursor: pointer; box-shadow: 0 3px 12px rgba(0,0,0,0.15); font-family: 'Nunito', sans-serif; }
.sync-status { font-size: 8px; padding: 2px 6px; border-radius: 6px; font-weight: 700; }
.sync-ok { background: var(--green-light); color: var(--green); }
.sync-err { background: var(--red-light); color: var(--red); }
.sync-wait { background: #FEF3C7; color: #D97706; }
.quickadd-popup { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); padding: 6px; z-index: 50; display: flex; flex-direction: column; gap: 3px; }
.quickadd-btn { border: none; padding: 9px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; background: #f5f5f5; transition: all 0.15s; white-space: nowrap; text-align: left; width: 100%; }
.quickadd-btn:active { transform: scale(0.95); }
.quickadd-overlay { position: fixed; inset: 0; z-index: 40; }
.weight-chart-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
.weight-chart-modal { background: #fff; border-radius: 20px; padding: 18px 14px; width: 100%; max-width: 460px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease; }
.weight-chart-title { font-size: 15px; font-weight: 800; margin-bottom: 12px; text-align: center; }
.weight-chart-canvas { width: 100%; border-radius: 12px; background: #fafafa; }
.weight-legend { display: flex; justify-content: center; gap: 16px; margin-top: 10px; }
.weight-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; }
.weight-legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.weight-range-row { display: flex; gap: 6px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
.weight-range-btn { padding: 5px 12px; border-radius: 999px; border: 1px solid var(--border); background: #fff; font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700; color: #666; cursor: pointer; transition: all 0.15s; }
.weight-range-btn.active { background: var(--gabriel-pri); color: #fff; border-color: var(--gabriel-pri); }
.weight-range-btn:active { transform: scale(0.95); }
.weight-chart-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
body.dark .weight-range-btn { background: #1e1e30; color: #ddd; border-color: #333; }
body.dark .weight-range-btn.active { background: var(--gabriel-pri); color: #fff; }
body.dark .weight-chart-canvas { background: #0f0f1a; }
.weight-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 10px; background: var(--card); border-radius: 14px; border: none; box-shadow: 0 1px 8px rgba(0,0,0,0.04); font-size: 12px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; color: #555; margin-top: 8px; transition: all 0.15s; }
.weight-btn:active { transform: scale(0.97); }
.weight-entry { background: var(--card); border-radius: 12px; padding: 8px 10px; box-shadow: 0 1px 8px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 8px; border-left: 3px solid; margin-bottom: 6px; }
.toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(100px); background: #10B981; color: #fff; padding: 8px 20px; border-radius: 12px; font-size: 12px; font-weight: 800; font-family: 'Nunito', sans-serif; z-index: 300; box-shadow: 0 4px 15px rgba(16,185,129,0.3); transition: transform 0.3s ease, opacity 0.3s ease; pointer-events: none; opacity: 0; visibility: hidden; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; visibility: visible; }
.lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; text-align: center; }
.lock-icon { font-size: 64px; margin-bottom: 16px; }
.lock-title { font-size: 22px; font-weight: 800; color: #1a1a2e; margin-bottom: 6px; }
.lock-sub { font-size: 12px; color: #888; margin-bottom: 24px; }
.lock-input { width: 100%; max-width: 260px; padding: 12px 16px; border-radius: 14px; border: 2px solid #ddd; font-size: 16px; font-family: 'Nunito', sans-serif; font-weight: 700; text-align: center; outline: none; transition: border 0.2s; }
.lock-input:focus { border-color: #4A90D9; }
.lock-btn { margin-top: 14px; width: 100%; max-width: 260px; padding: 12px; border-radius: 14px; border: none; background: linear-gradient(135deg,#4A90D9,#2D6CB4); color: #fff; font-size: 14px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; box-shadow: 0 4px 15px rgba(74,144,217,0.3); }
.lock-error { color: #EF4444; font-size: 11px; font-weight: 700; margin-top: 8px; min-height: 16px; }
.report-section { margin-bottom: 16px; }
.report-section h3 { font-size: 13px; font-weight: 800; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 2px solid #eee; }
.report-stat { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
.report-stat .label { color: #888; }
.report-stat .value { font-weight: 700; }
.report-flag { color: #EF4444; font-weight: 700; font-size: 11px; }
.report-ok { color: #10B981; font-weight: 700; font-size: 11px; }
@media print {
  body > *:not(#modal-root) { display: none !important; }
  .modal-bg { position: static !important; background: none !important; }
  .modal { border-radius: 0 !important; max-height: none !important; box-shadow: none !important; }
  .btn-cancel, .modal-handle { display: none !important; }
}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="toast" class="toast"></div>
<script>
// =============================================
// CONFIG - Supabase credentials
// =============================================
const SUPABASE_URL = "https://ukcwajbbybkobaroyqiq.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_jicoWcdW87NzVXFQTx3fxA_dJOv_dVe";
// ─── DARK MODE ───
const DARK_KEY = "pappatracker_darkmode";
function isDark() {
  const saved = localStorage.getItem(DARK_KEY);
  if (saved !== null) return saved === "true";
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}
function toggleDark() {
  const dark = !document.body.classList.contains('dark');
  document.body.classList.toggle('dark', dark);
  localStorage.setItem(DARK_KEY, dark);
  render();
}
if (isDark()) document.body.classList.add('dark');
// ─── DATA CONFIG ───
const BABIES = ["Gabriel", "Vittorio"];
const FEED_TYPES = ["Formula", "Materno"];
const DIAPER_TYPES = ["Cacca", "Pipì", "Entrambi"];
const COLORS = {
  Gabriel: { pri: "#4A90D9", acc: "#2D6CB4", light: "#E8F1FB", grad: "linear-gradient(135deg,#4A90D9,#2D6CB4)" },
  Vittorio: { pri: "#14B8A6", acc: "#0D9488", light: "#E6FAF7", grad: "linear-gradient(135deg,#14B8A6,#0D9488)" }
};
const MONTHS = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const DAYNAMES = ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
const THERAPIES = {
  Gabriel: [
    { id: "smartprevit", name: "Smart Previt", cat: "Multi-vitaminico", icon: "💊", dose: "1 ml/giorno", color: "#F59E0B" },
    { id: "ferrodue", name: "Ferrodue", cat: "Ferro", icon: "🩸", dose: "2 gocce/Kg fino al 6° mese", color: "#EF4444" }
  ],
  Vittorio: [
    { id: "smartprevit", name: "Smart Previt", cat: "Multi-vitaminico", icon: "💊", dose: "1 ml/giorno", color: "#F59E0B" },
    { id: "ferrodue", name: "Ferrodue", cat: "Ferro", icon: "🩸", dose: "2 gocce/Kg fino al 6° mese", color: "#EF4444" },
    { id: "aldactazide", name: "Aldactazide", cat: "Diuretico", icon: "💧", dose: "0,8 ml/giorno", color: "#3B82F6", doseHistory: [{ before: "2026-04-02", dose: "0,6 ml/giorno" }] }
  ]
};
const STORAGE_KEY = "pappatracker_data_v2";
// ─── STATE ───
let state = { data: {}, baby: "Gabriel", tab: "feed", selDate: new Date(), viewMonth: new Date(), syncStatus: "local" };
function dk(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function getDose(t, dateStr, baby) {
  const bn = baby || state.baby;
  const overrides = state.data.doseOverrides?.[bn]?.[t.id];
  if(overrides && overrides.length) {
    const sorted = [...overrides].sort((a,b) => b.from.localeCompare(a.from));
    for(const o of sorted) { if(dateStr >= o.from) return o.dose; }
  }
  if(t.doseHistory) { for(const h of t.doseHistory){ if(dateStr < h.before) return h.dose; } }
  return t.dose;
}
function ft(h,m) { return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`; }
// ─── STORAGE (localStorage + Supabase sync) ───
function loadLocal() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) state.data = JSON.parse(s); migrateTemperatures(); cleanDuplicates(); } catch(e) {}
}
function saveLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data)); } catch(e) {}
}
// Supabase helpers
function useSupabase() { return SUPABASE_URL && SUPABASE_ANON_KEY; }
async function supaFetch(method, path, body) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method, headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      "Content-Type": "application/json",
      "Prefer": method === "POST" ? "resolution=merge-duplicates,return=minimal" : "return=minimal"
    },
    body: body ? JSON.stringify(body) : undefined
  });
  return r;
}
// DEPRECATED: do NOT call. Earlier version assigned random UUIDs to legacy entries,
// which caused per-device divergent IDs and cross-device duplication. Kept as a
// no-op so legacy code paths don't break.
function addMissingIds() { /* no-op */ }
// ─── Tombstones (deletion markers for cross-device merge) ───
// Without tombstones the union-merge would resurrect any entry that was deleted
// locally but still present on the cloud. Each delete records a tombstone with the
// removed entry's id (plus date/baby/kind) so the merge can filter it out.
const TOMBSTONE_TTL_MS = 30 * 86400000; // 30 days
function getTombstones() {
  if (!Array.isArray(state.data._tombstones)) state.data._tombstones = [];
  return state.data._tombstones;
}
function tombstoneKey(t) {
  return `${t.kind||''}|${t.dateKey||''}|${t.baby||''}|${t.id||''}`;

async function syncToCloudMerged() {

    saveLocal();
    return;

  try {
    state.syncStatus = "syncing"; render();
    let remote = {};

      const r = await fetch(`${SUPABASE_URL}/rest/v1/pappa_tracker_data?id=eq.main&select=data`, {
        headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
      });
      const rows = await r.json();
      if (rows.length > 0 && rows[0].data) remote = rows[0].data;
    } catch(fe) { console.error("Pre-save fetch failed:", fe); /* fallback: push local as-is */ }
    state.data = mergeData(state.data, remote);
    migrateTemperatures();
    cleanDuplicates();
    saveLocal();
    await supaFetch("POST", "pappa_tracker_data", { id: "main", data: state.data });
    state.syncStatus = "ok"; render();
  } catch(e) { console.error("Sync error:", e); state.syncStatus = "error"; render(); }
}
async function syncFromCloud() {
  if (!useSupabase()) return;
  try {
    state.syncStatus = "syncing"; render();
    const r = await fetch(`${SUPABASE_URL}/rest/v1/pappa_tracker_data?id=eq.main&select=data`, {
      headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
    });
    const rows = await r.json();
    if (rows.length > 0 && rows[0].data) {
      // Merge remote into local instead of overwriting, so unsaved local edits survive.
      state.data = mergeData(state.data, rows[0].data);
      migrateTemperatures();
      cleanDuplicates();
      saveLocal();
    }
    state.syncStatus = "ok"; render();
  } catch(e) { console.error("Load cloud error:", e); state.syncStatus = "error"; render(); }
}

function migrateTemperatures() {
  for(const key in state.data) {
    if(key==='doseOverrides' || key==='_tombstones') continue;
    const day = state.data[key];
    if (!day || typeof day !== 'object' || Array.isArray(day)) continue;
    for(const bn in day) {
      const bd=day[bn];
      if (!bd || typeof bd !== 'object') continue;
      if(bd.temperature && !Array.isArray(bd.temperature)) {

  const first = new Date(y, mo, 1), last = new Date(y, mo+1, 0);
  let start = first.getDay()-1; if(start<0) start=6;
  const days = [];

  for(let i=1;i<=last.getDate();i++) days.push({date:new Date(y,mo,i),cur:true});

}

function getLastFeedAgo(bn) {

  const todayKey = dk(now);
  const yesterdayKey = dk(new Date(now.getFullYear(), now.getMonth(), now.getDate()-1));
  for (const dateKey of [todayKey, yesterdayKey]) {
    const feeds = state.data[dateKey]?.[bn]?.feeds;
    if (feeds && feeds.length) {
      const lastFeed = feeds[feeds.length - 1];
      const [hh, mm] = lastFeed.time.split(':').map(Number);
      const feedDate = new Date(parseInt(dateKey.split('-')[0]), parseInt(dateKey.split('-')[1])-1, parseInt(dateKey.split('-')[2]), hh, mm);
      const diffMs = now - feedDate;
      const diffH = Math.floor(diffMs / 3600000);
      const diffM = Math.floor((diffMs % 3600000) / 60000);
      const color = diffH < 3 ? '#10B981' : diffH < 4 ? '#F59E0B' : '#EF4444';
      const text = diffH > 0 ? `${diffH}h ${diffM}min fa` : `${diffM}min fa`;

    const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() - off*30);

    }
  }

  if (!gData.length && !vData.length) {

let realtimeChannel = null;
function initRealtime() {
  if (!useSupabase() || !window.supabase || supaClient) return;
  try {
    supaClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    realtimeChannel = supaClient
      .channel('pappa-changes')
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'pappa_tracker_data', filter: 'id=eq.main' },
        (payload) => {
          const row = payload && (payload.new || payload.record);
          if (row && row.data) {
            state.data = mergeData(state.data, row.data);
            migrateTemperatures();
            cleanDuplicates();
            saveLocal();
            render();
          }
        })
      .subscribe();
  } catch(e) { console.error("Realtime init error:", e); }
}
let lastFocusSync = 0;
function onAppFocus() {
  if (!isAuthenticated()) return;
  // Throttle: avoid double fire (visibilitychange + focus often fire together)
  const now = Date.now();
  if (now - lastFocusSync < 1500) return;
  lastFocusSync = now;
  syncFromCloud();
}
function initApp() {
  loadLocal();
  render();
  syncFromCloud().then(() => initRealtime());
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') onAppFocus();
  });
  window.addEventListener('focus', onAppFocus);
}
// ─── INIT ───
if (isAuthenticated()) {
  initApp();
} else {
  showLockScreen();
}
</script>
